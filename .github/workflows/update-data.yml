name: Update WC data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-wc-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if updates are still needed
        id: need_update
        run: |
          if grep -Eq '"status": "(upcoming|live)"' data/matches.js; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Pending or live matches found. Continue update."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "All tracked matches are ended. Skip update."
          fi

      - name: Set up Python
        if: steps.need_update.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update data file
        if: steps.need_update.outputs.should_run == 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/update_wc_data.py --file data/matches.js --competition WC --season 2026

      - name: Commit and push if meaningful changes
        if: steps.need_update.outputs.should_run == 'true'
        run: |
          if git diff --quiet -- data/matches.js; then
            echo "No data changes."
            exit 0
          fi

          git show HEAD:data/matches.js | grep -vE '^\s*"updatedAt": ' > /tmp/matches-old.json
          grep -vE '^\s*"updatedAt": ' data/matches.js > /tmp/matches-new.json
          if cmp -s /tmp/matches-old.json /tmp/matches-new.json; then
            echo "Only updatedAt changed. Skip commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.js
          git commit -m "chore(data): update WC matches data"
          git push
